name: Publish Container Images to ACR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      API_IMAGE: abhijeetsite-api
      WEB_IMAGE: ${{ vars.WEB_APP || 'abhijeetsite-web' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get short SHA
        id: slug
        run: echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure Container Registry
        run: |
          az acr show \
            --name ${{ vars.ACR_NAME }} \
            --query "{loginServer:loginServer, publicNetworkAccess:publicNetworkAccess, provisioningState:provisioningState}" \
            --output table

      - name: Build and Push API Container Image (ACR Build)
        run: |
          az acr build \
            --registry ${{ vars.ACR_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image "$API_IMAGE:$SHA_SHORT" \
            --file src/AbhijeetSite.Api/Dockerfile \
            .

      - name: Build and Push Web Container Image (ACR Build)
        run: |
          az acr build \
            --registry ${{ vars.ACR_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image "$WEB_IMAGE:$SHA_SHORT" \
            --file src/AbhijeetSite.Web/Dockerfile \
            src/AbhijeetSite.Web
